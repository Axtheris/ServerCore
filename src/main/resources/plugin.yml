name: ServerCore
version: '${version}'
main: net.axther.serverCore.ServerCore
api-version: '1.21'
description: Swag
softdepend: [ModelEngine, PlaceholderAPI, PacketEvents]

commands:
  cosmetic:
    description: Manage mob cosmetics
    usage: /cosmetic <apply|remove|clear|info|calibrate|gui>
  emitter:
    description: Manage particle emitters
    usage: /emitter <create|remove|list|edit|info|gui>
  pet:
    description: Manage player pets
    usage: /pet <summon|dismiss|sit|follow|feed|list|give|gui|reload>
  hologram:
    description: Manage text display holograms
    usage: /hologram <create|remove|addline|removeline|edit|list|near|movehere|setanimation|gui>
  npc:
    description: Manage NPCs and dialogue
    usage: /npc <create|remove|movehere|list|reload|gui>
  quest:
    description: Manage player quests
    usage: /quest <active|completed|abandon|gui|reload>
  timeline:
    description: Manage event timelines
    usage: /timeline <play|stop|list|reload>
  menu:
    description: Open a custom menu
    usage: /menu <id>
  servercore:
    description: ServerCore admin commands
    usage: /servercore reload

permissions:
  # --- Wildcard parent permissions ---
  servercore.admin.*:
    description: Grants all servercore admin permissions
    default: op
    children:
      servercore.admin.reload: true
  servercore.cosmetic.*:
    description: Grants all cosmetic permissions
    default: op
    children:
      servercore.cosmetic.apply: true
      servercore.cosmetic.remove: true
      servercore.cosmetic.clear: true
      servercore.cosmetic.info: true
      servercore.cosmetic.calibrate: true
      servercore.cosmetic.gui: true
  servercore.emitter.*:
    description: Grants all emitter permissions
    default: op
    children:
      servercore.emitter.create: true
      servercore.emitter.remove: true
      servercore.emitter.list: true
      servercore.emitter.edit: true
      servercore.emitter.info: true
      servercore.emitter.gui: true
  servercore.pet.*:
    description: Grants all pet permissions
    default: op
    children:
      servercore.pet.summon: true
      servercore.pet.dismiss: true
      servercore.pet.sit: true
      servercore.pet.follow: true
      servercore.pet.feed: true
      servercore.pet.list: true
      servercore.pet.give: true
      servercore.pet.reload: true
      servercore.pet.gui: true
  servercore.hologram.*:
    description: Grants all hologram permissions
    default: op
    children:
      servercore.hologram.create: true
      servercore.hologram.remove: true
      servercore.hologram.addline: true
      servercore.hologram.removeline: true
      servercore.hologram.edit: true
      servercore.hologram.list: true
      servercore.hologram.near: true
      servercore.hologram.movehere: true
      servercore.hologram.setanimation: true
      servercore.hologram.gui: true
  servercore.npc.*:
    description: Grants all NPC permissions
    default: op
    children:
      servercore.npc.create: true
      servercore.npc.remove: true
      servercore.npc.movehere: true
      servercore.npc.list: true
      servercore.npc.reload: true
      servercore.npc.gui: true
  servercore.quest.*:
    description: Grants all quest permissions
    default: op
    children:
      servercore.quest.active: true
      servercore.quest.completed: true
      servercore.quest.abandon: true
      servercore.quest.gui: true
      servercore.quest.reload: true
  servercore.timeline.*:
    description: Grants all timeline permissions
    default: op
    children:
      servercore.timeline.play: true
      servercore.timeline.stop: true
      servercore.timeline.list: true
      servercore.timeline.reload: true
  # --- Individual permissions ---
  servercore.admin.reload:
    description: Reload central config
    default: op
  servercore.cosmetic.apply:
    description: Apply cosmetics to mobs
    default: op
  servercore.cosmetic.remove:
    description: Remove cosmetics from mobs
    default: op
  servercore.cosmetic.clear:
    description: Clear all cosmetics
    default: op
  servercore.cosmetic.info:
    description: View held item info
    default: op
  servercore.cosmetic.calibrate:
    description: Enter cosmetic calibration mode
    default: op
  servercore.cosmetic.gui:
    description: Open cosmetic manager GUI
    default: op
  servercore.emitter.create:
    description: Create particle emitters
    default: op
  servercore.emitter.remove:
    description: Remove particle emitters
    default: op
  servercore.emitter.list:
    description: List active emitters
    default: op
  servercore.emitter.edit:
    description: Edit emitter properties
    default: op
  servercore.emitter.info:
    description: View emitter info
    default: op
  servercore.emitter.gui:
    description: Open emitter manager GUI
    default: op
  servercore.pet.summon:
    description: Summon a pet
    default: true
  servercore.pet.dismiss:
    description: Dismiss active pets
    default: true
  servercore.pet.sit:
    description: Toggle pet sit mode
    default: true
  servercore.pet.follow:
    description: Make pets follow you
    default: true
  servercore.pet.feed:
    description: Feed your pets
    default: true
  servercore.pet.list:
    description: List owned pets
    default: true
  servercore.pet.give:
    description: Give pet items to players
    default: op
  servercore.pet.reload:
    description: Reload pet configs
    default: op
  servercore.pet.gui:
    description: Open pet collection GUI
    default: true
  servercore.hologram.create:
    description: Create holograms
    default: op
  servercore.hologram.remove:
    description: Remove holograms
    default: op
  servercore.hologram.addline:
    description: Add lines to holograms
    default: op
  servercore.hologram.removeline:
    description: Remove lines from holograms
    default: op
  servercore.hologram.edit:
    description: Edit hologram text
    default: op
  servercore.hologram.list:
    description: List all holograms
    default: op
  servercore.hologram.near:
    description: Find nearby holograms
    default: op
  servercore.hologram.movehere:
    description: Move holograms to your location
    default: op
  servercore.hologram.setanimation:
    description: Set hologram animations
    default: op
  servercore.hologram.gui:
    description: Open hologram manager GUI
    default: op
  servercore.npc.create:
    description: Create NPCs
    default: op
  servercore.npc.remove:
    description: Remove NPCs
    default: op
  servercore.npc.movehere:
    description: Move NPCs to your location
    default: op
  servercore.npc.list:
    description: List all NPCs
    default: op
  servercore.npc.reload:
    description: Reload NPC configs
    default: op
  servercore.npc.gui:
    description: Open NPC browser GUI
    default: op
  servercore.quest.active:
    description: View active quests
    default: true
  servercore.quest.completed:
    description: View completed quests
    default: true
  servercore.quest.abandon:
    description: Abandon active quests
    default: true
  servercore.quest.gui:
    description: Open quest journal GUI
    default: true
  servercore.quest.reload:
    description: Reload quest definitions
    default: op
  servercore.timeline.play:
    description: Play timelines
    default: op
  servercore.timeline.stop:
    description: Stop timelines
    default: op
  servercore.timeline.list:
    description: List all timelines
    default: op
  servercore.timeline.reload:
    description: Reload timeline configs
    default: op
