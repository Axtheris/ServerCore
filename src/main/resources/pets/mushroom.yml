feed-cooldown-ticks: 450
heart-particle-count: 5
sounds:
  spore:
    sound: BLOCK_FUNGUS_BREAK
    volume: 0.2
    pitch: 1.5
    chance: 400
  pop:
    sound: BLOCK_CHORUS_FLOWER_GROW
    volume: 0.15
    pitch: 1.8
    chance: 600

