# ServerCore Central Configuration
# Toggle systems on/off. Changes take effect after /servercore reload.

systems:
  cosmetics:
    enabled: true
  emitters:
    enabled: true
  pets:
    enabled: true
  holograms:
    enabled: true
  npcs:
    enabled: true
    view-distance: 48
  quests:
    enabled: true
    max-active-quests: 0
    action-bar-progress: true
  timelines:
    enabled: true
  reactive:
    enabled: true
  gui:
    enabled: true
