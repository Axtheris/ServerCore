display-name: "Fox"
head-texture: "REPLACE_ME"
item-name: "<gradient:#FF8C00:#FFDF00><bold>Fox Pet</bold></gradient>"
item-lore:
  - "<gold>A sly and playful fox kit."
  - ""
  - "<dark_gray>Sniffs around curiously and"
  - "<dark_gray>lets out little yips of joy!"
  - ""
  - "<yellow>Right-click <gray>to summon/dismiss"
use-small-stand: true
passive-by-default: false
animation-type: HOP
bob-amplitude: 0.11
bob-frequency: 0.10
hover-height: 1.0
follow-speed: 0.33
can-attack: true
attack-range: 5.0
attack-damage: 1.5
attack-cooldown-ticks: 18
feed-cooldown-ticks: 450
heart-particle-count: 5
sounds:
  sniff:
    sound: ENTITY_FOX_SNIFF
    volume: 0.5
    pitch: 1.3
    chance: 180
  yip:
    sound: ENTITY_FOX_AMBIENT
    volume: 0.3
    pitch: 1.5
    chance: 400

