display-name: "Mushroom"
head-texture: "REPLACE_ME"
item-name: "<gradient:#FF6347:#8B0000><bold>Mushroom Pet</bold></gradient>"
item-lore:
  - "<red>A mystical floating mushroom."
  - ""
  - "<dark_gray>Releases tiny spores and"
  - "<dark_gray>glows softly in the dark!"
  - ""
  - "<yellow>Right-click <gray>to summon/dismiss"
use-small-stand: true
